<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>A Selection of Work — Architecture</title>
<meta name="description" content="A selection of architecture & urban design work.">
<script>
(function(){
  try{
    var p = new URLSearchParams(location.search);
    var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    var headless = /HeadlessChrome|Headless/.test(navigator.userAgent);
    window.__STATIC = headless || p.has('static') || reduce;
    window.__CAP = p.has('cap');
  }catch(e){ window.__STATIC = false; }
  document.documentElement.classList.toggle('is-static', !!window.__STATIC);
  document.documentElement.classList.toggle('capture', !!window.__CAP);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

:root{
  --bg:#F4F1EC; --bg-deep:#ECE7DF;
  --ink:#17150F; --ink-70:#46423A; --muted:#8A8378;
  --line:rgba(23,21,15,0.12);
  --accent:#BC4B2B; --accent-deep:#9E3C1F;
  --font-display:'Bricolage Grotesque','Arial Narrow',sans-serif;
  --font-text:'Hanken Grotesk',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --mx:clamp(20px,5vw,80px);
  --label:600 0.72rem/1 var(--font-text);
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;}
html{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body{ margin:0; background:var(--bg); color:var(--ink-70);
  font-family:var(--font-text); font-size:17px; line-height:1.6; }
img,video{ display:block; max-width:100%; }

/* ── NAV ────────────────────────────────────────────────────────── */
.nav{ position:fixed; top:0; left:0; right:0; z-index:60;
  display:flex; align-items:center; justify-content:space-between;
  padding:18px var(--mx); color:#fff; mix-blend-mode:difference; }
.nav__brand{ font-family:var(--font-display); font-weight:600; font-size:1.05rem; color:inherit; text-decoration:none; }
.nav__role{ font:var(--label); letter-spacing:0.14em; text-transform:uppercase; color:inherit; }
@media (max-width:640px){ .nav__role{ display:none; } }
.nav--solid{ color:var(--ink); mix-blend-mode:normal; background:var(--bg); border-bottom:1px solid var(--line); }

/* ── ORBITAL VIDEO HERO ─────────────────────────────────────────── */
.pj-hero{ position:relative; height:100svh; min-height:560px; overflow:hidden; background:var(--ink); }
.pj-hero--first{ position:sticky; top:0; }
.pj-hero__media{ position:absolute; inset:0; }
.pj-hero__el{ width:100%; height:100%; object-fit:cover; }
.pj-hero__scrim{ position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(180deg, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0) 24%, rgba(0,0,0,0) 46%, rgba(0,0,0,0.62) 100%); }
.pj-hero__cap{ position:absolute; left:0; right:0; bottom:0; padding:0 var(--mx) 6.5vh; color:#fff;
  display:flex; justify-content:space-between; align-items:flex-end; gap:48px; }
.pj-cap-l{ max-width:62%; }
.pj-title{ font-family:var(--font-display); font-weight:600;
  font-size:clamp(2.4rem,6.6vw,5.6rem); line-height:0.97; letter-spacing:-0.025em; margin:0; color:#fff; }
.pj-meta{ font:var(--label); letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.82); margin:16px 0 0; }
.pj-desc{ flex:0 1 360px; padding-bottom:8px; font-size:1rem; line-height:1.5; color:rgba(255,255,255,0.92); }
@media (max-width:860px){ .pj-hero__cap{ flex-direction:column; align-items:flex-start; gap:18px; }
  .pj-cap-l{ max-width:none; } .pj-desc{ flex-basis:auto; max-width:480px; } }
.pj-scroll{ position:absolute; right:var(--mx); bottom:6.5vh; font:var(--label); letter-spacing:0.16em;
  text-transform:uppercase; color:#fff; display:inline-flex; align-items:center; gap:9px; }
.pj-scroll .ar{ font-size:1rem; animation:bob 1.8s ease-in-out infinite; }
@keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(4px);} }
.pj-play{ position:absolute; inset:0; margin:auto; width:92px; height:92px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.85); background:rgba(0,0,0,0.22); color:#fff; cursor:pointer; z-index:5;
  display:flex; align-items:center; justify-content:center; font-size:23px; padding-left:5px;
  -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); transition:background .2s var(--ease), transform .2s var(--ease); }
.pj-play:hover{ background:rgba(188,75,43,0.9); transform:scale(1.06); }
.pj-play.hidden{ display:none; }
.pj-watch{ position:absolute; left:50%; top:calc(50% + 66px); transform:translateX(-50%); z-index:5;
  font:var(--label); letter-spacing:0.16em; text-transform:uppercase; color:#fff; pointer-events:none; }
.pj-watch.hidden{ display:none; }
.pj-hero--first .pj-hero__el{ transform:scale(1.12); animation:heroIn 1.7s var(--ease) .1s both; }
@keyframes heroIn{ from{ transform:scale(1.12); clip-path:inset(7% 7% 7% 7%); } to{ transform:scale(1.0); clip-path:inset(0 0 0 0); } }
.pj-hero--first .pj-hero__cap{ animation:capIn 1s ease .85s both; }
.pj-hero--first .pj-scroll{ animation:capIn 1s ease 1.1s both; }
@keyframes capIn{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:none;} }

/* ── FULL PDF PAGES ─────────────────────────────────────────────── */
.page-sec{ background:var(--bg); }
.page-img{ width:100%; height:auto; }

/* ── REVEAL + STATIC ────────────────────────────────────────────── */
[data-reveal]{ opacity:0; transform:translateY(34px); transition:opacity 1.1s var(--ease), transform 1.1s var(--ease); }
[data-reveal].in-view{ opacity:1; transform:none; }
html.is-static [data-reveal]{ opacity:1 !important; transform:none !important; }
html.is-static .pj-hero__el{ transform:none !important; clip-path:none !important; }
html.is-static .pj-hero__cap,html.is-static .pj-scroll{ opacity:1 !important; transform:none !important; }
html.is-static *{ animation:none !important; transition:none !important; }
html.capture .pj-hero{ height:660px !important; min-height:0 !important; }
@media (prefers-reduced-motion:reduce){ [data-reveal]{ opacity:1; transform:none; } .pj-hero__el{ transform:none !important; } }
</style>
</head>
<body>

<nav class="nav" id="nav">
  <a class="nav__brand" href="#" id="navBrand">A Selection of Work</a>
  <span class="nav__role">Architecture · Urban Design</span>
</nav>

<main>
  <!-- ORBITAL — video hero (kept as is) -->
  <section class="project" id="orbital">
    <figure class="pj-hero pj-hero--first">
      <div class="pj-hero__media">
        <video class="pj-hero__el" poster="assets/orbital-hero.jpg" preload="none" playsinline controls>
          <source src="assets/orbital.mp4" type="video/mp4">
        </video>
      </div>
      <div class="pj-hero__scrim"></div>
      <button class="pj-play" type="button" aria-label="Play film">&#9654;</button>
      <span class="pj-watch">Watch the film</span>
      <figcaption class="pj-hero__cap">
        <div class="pj-cap-l">
          <h2 class="pj-title">An Orbital Odyssey</h2>
          <p class="pj-meta">Speculative thesis · The M25, London · 2019</p>
        </div>
        <div class="pj-desc">A speculative life lived on the M25 in an endless loop — London&rsquo;s orbital motorway read as culture and infrastructure.</div>
      </figcaption>
      <span class="pj-scroll">Scroll <span class="ar">&#8595;</span></span>
    </figure>
  </section>

  <!-- FULL PDF PAGES (their own layouts + text) -->
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-05.jpg" alt="Audemars Piguet Hôtel & Google HQ" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-04.jpg" alt="Wenshan Experimental High School" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-02.jpg" alt="AN House" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-03.jpg" alt="ToSummer Sanlitun" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-06.jpg" alt="Windmill Hill development & House in Kobe" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-07.jpg" alt="Salvage Water & Soil — Hooke Park" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-08.jpg" alt="Hooke Park — long-term work programme" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-10.jpg" alt="Cooperative Education — Athens" loading="lazy"></section>
  <section class="page-sec"><img class="page-img" data-reveal src="assets/page-11.jpg" alt="Cooperative Education — Athens, plans & models" loading="lazy"></section>
</main>

<script>
(function(){
  "use strict";
  var STATIC = !!window.__STATIC;
  if(STATIC){
    document.querySelectorAll('[data-reveal]').forEach(function(el){ el.classList.add('in-view'); });
    document.querySelectorAll('img[loading="lazy"]').forEach(function(img){ img.setAttribute('loading','eager'); });
  } else if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in-view'); io.unobserve(e.target); } });
    }, { rootMargin:'0px 0px -10% 0px', threshold:0.08 });
    document.querySelectorAll('[data-reveal]').forEach(function(el){ io.observe(el); });
  } else {
    document.querySelectorAll('[data-reveal]').forEach(function(el){ el.classList.add('in-view'); });
  }

  /* video click-to-play */
  function hideOverlay(fig){
    var b = fig.querySelector('.pj-play'); if(b) b.classList.add('hidden');
    var w = fig.querySelector('.pj-watch'); if(w) w.classList.add('hidden');
  }
  document.querySelectorAll('.pj-play').forEach(function(btn){
    btn.addEventListener('click', function(){ var fig=btn.closest('.pj-hero'); var v=fig.querySelector('video'); if(v){ v.play(); hideOverlay(fig); } });
  });
  document.querySelectorAll('.pj-hero video').forEach(function(v){
    v.addEventListener('play', function(){ hideOverlay(v.closest('.pj-hero')); });
  });

  /* nav solid past the hero */
  var nav = document.getElementById('nav');
  function onScroll(){ nav.classList.toggle('nav--solid', window.scrollY > window.innerHeight*0.85); }
  if(!STATIC){ window.addEventListener('scroll', onScroll, {passive:true}); onScroll(); }
  document.getElementById('navBrand').addEventListener('click', function(e){
    e.preventDefault();
    if(window.__lenis){ window.__lenis.scrollTo(0); } else { window.scrollTo({top:0,behavior:'smooth'}); }
  });

  /* Lenis inertia */
  if(!STATIC){
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/lenis@1.1.13/dist/lenis.min.js';
    s.onload = function(){ if(!window.Lenis) return; var lenis=new Lenis({lerp:0.085,wheelMultiplier:0.9,smoothWheel:true}); window.__lenis=lenis; function raf(t){ lenis.raf(t); requestAnimationFrame(raf);} requestAnimationFrame(raf); };
    document.body.appendChild(s);
  }
})();
</script>
</body>
</html>
